name: messaging_app
description: تطبيق مراسلة احترافي مشابه لواتساب

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core
  cupertino_icons: ^1.0.6
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^7.6.4
  injectable: ^2.3.2
  
  # Networking
  dio: ^5.4.0
  socket_io_client: ^2.0.2
  web_socket_channel: ^2.4.0
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # Security
  encrypt: ^5.0.1
  crypto: ^3.0.3
  local_auth: ^2.1.8
  
  # Media
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  video_player: ^2.8.2
  chewie: ^1.7.1
  photo_view: ^0.14.0
  
  # Calls
  flutter_webrtc: ^0.9.47
  sip_ua: ^0.5.8
  
  # Notifications
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.2
  
  # UI
  shimmer: ^3.0.0
  flutter_slidable: ^3.0.1
  emoji_picker_flutter: ^1.6.4
  flutter_sound: ^9.2.13
  permission_handler: ^11.2.0
  contacts_service: ^0.6.3
  
  # State & Utils
  intl: ^0.18.1
  timeago: ^3.6.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/fonts/
  
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
